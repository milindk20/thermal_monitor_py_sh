services:
  thermal_monitor:
    image: ubuntu:24.04
    container_name: thermal_monitor
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./logs:/app/logs
    ports:
      - "5001:5002"
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y python3 python3-pip python3-venv lm-sensors &&
      cd /app &&
      pip3 install --no-cache-dir flask &&
      python3 app.py
      "
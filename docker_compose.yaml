services:
  thermal_monitor:
    image: ubuntu:24.04
    container_name: thermal_monitor
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./logs:/app/logs
    ports:
      - "5001:5002"
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y git python3 python3-pip python3-venv lm-sensors &&
      git clone https://github.com/milindk20/thermal_monitor_py_sh /app || true &&
      cd /app &&
      python3 -m venv venv &&
      . venv/bin/activate &&
      pip install --upgrade pip &&
      pip3 install --no-cache-dir flask &&
      python3 app.py
      "
